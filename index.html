<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Biner Sederhana</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        h1 {
            color: #343a40;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 18px;
        }
        .button-container {
            display: flex;
            justify-content: space-between;
        }
        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 60px;
        }
        button:hover {
            background-color: #0056b3;
        }
        h2 {
            margin-top: 20px;
            color: #343a40;
        }
        #result {
            font-weight: bold;
            font-size: 24px;
            color: #007bff;
        }
        .icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kalkulator Biner</h1>
        <input type="text" id="binary1" placeholder="Angka Biner 1" />
        <input type="text" id="binary2" placeholder="Angka Biner 2" />
        <div class="button-container">
            <button onclick="calculate('+')"><i class="icon fas fa-plus"></i></button>
            <button onclick="calculate('-')"><i class="icon fas fa-minus"></i></button>
            <button onclick="calculate('*')"><i class="icon fas fa-times"></i></button>
            <button onclick="calculate('/')"><i class="icon fas fa-divide"></i></button>
        </div>
        
        <h2>Hasil: <span id="result"></span></h2>
    </div>

    <script>
        function calculate(operator) {
            const binary1 = document.getElementById('binary1').value;
            const binary2 = document.getElementById('binary2').value;

            const num1 = parseInt(binary1, 2);
            const num2 = parseInt(binary2, 2);
            let result;

            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    result = num1 / num2;
                    break;
                default:
                    return;
            }

            document.getElementById('result').innerText = result.toString(2);
        }
    </script>

</body>
</html>
